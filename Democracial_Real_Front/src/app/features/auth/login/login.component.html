<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px">
      <div style="width:100%;max-width:420px">
        <div style="text-align:center;margin-bottom:40px">
          <div style="display:inline-flex;align-items:center;gap:10px;margin-bottom:16px">
            <div style="width:10px;height:10px;background:var(--accent);border-radius:50%;box-shadow:0 0 16px var(--accent)"></div>
            <span style="font-family:'Syne',sans-serif;font-size:24px;font-weight:800">VotApp</span>
          </div>
          <h1 style="font-size:28px;font-weight:800;margin-bottom:8px">Bienvenido de vuelta</h1>
          <p class="text-muted">Accede a tus grupos y votaciones</p>
        </div>

        <div class="card">
          @if (error) {
            <div class="alert alert-error mb-16">{{ error }}</div>
          }
          <div style="display:flex;flex-direction:column;gap:16px">
            <div class="form-group">
              <label class="form-label">Usuario</label>
              <input class="form-control" [(ngModel)]="username" placeholder="tu_usuario" (keyup.enter)="login()">
            </div>
            <div class="form-group">
              <label class="form-label">Contraseña</label>
              <input class="form-control" type="password" [(ngModel)]="password" placeholder="••••••••" (keyup.enter)="login()">
            </div>
            <button class="btn btn-primary w-full" style="justify-content:center;padding:14px" (click)="login()" [disabled]="loading">
              {{ loading ? 'Accediendo...' : 'Iniciar sesión' }}
            </button>
          </div>
        </div>

        <p style="text-align:center;margin-top:20px" class="text-muted">
          ¿No tienes cuenta?
          <a routerLink="/register" style="color:var(--accent);text-decoration:none;font-weight:500"> Regístrate</a>
        </p>
      </div>
    </div>
