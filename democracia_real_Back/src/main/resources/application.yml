server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/votapp
    username: ${DB_USERNAME:votapp_user}
    password: ${DB_PASSWORD:votapp_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  jackson:
    serialization:
      write-dates-as-timestamps: false

app:
  jwt:
    secret: ${JWT_SECRET:VotAppSuperSecretKeyForJWTTokenGeneration2024ChangeInProduction}
    expiration: 86400000  # 24 hours in ms
    refresh-expiration: 604800000  # 7 days in ms

logging:
  level:
    com.votapp: DEBUG
    org.springframework.security: INFO
